name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: JWT_SECRET_KEY,OPENROUTER_API_KEY
          script: |
            cd /opt/zakupai
            git pull origin main
            cp landing/index.html /var/www/landing/index.html
            cp landing/robots.txt /var/www/landing/robots.txt
            cp landing/sitemap.xml /var/www/landing/sitemap.xml
            grep -q '^JWT_SECRET_KEY=' .env 2>/dev/null || echo "JWT_SECRET_KEY=${JWT_SECRET_KEY}" >> .env
            sed -i "s|^OPENROUTER_API_KEY=.*|OPENROUTER_API_KEY=${OPENROUTER_API_KEY}|" .env
            docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml restart nginx
            docker image prune -f
