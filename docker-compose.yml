version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      METRICS_SERVICE_NAME: backend
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
      PERPLEXITY_MIN_CONTACTS: ${PERPLEXITY_MIN_CONTACTS}
    env_file: .env
    ports:
      - "8000:8000"

  etl-suppliers:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      METRICS_SERVICE_NAME: etl_suppliers
      METRICS_PORT: 9101
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
      PERPLEXITY_MIN_CONTACTS: ${PERPLEXITY_MIN_CONTACTS}
      WORKER_TASK_TYPES: supplier_search,supplier_search_perplexity
    env_file: .env

  etl-compare:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      METRICS_SERVICE_NAME: etl_compare
      METRICS_PORT: 9102
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      WORKER_TASK_TYPES: lot_comparison
    env_file: .env

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend

  doc-to-md:
    build:
      context: ./doc-to-md
    restart: unless-stopped
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
    volumes:
      - doc_to_md_models:/models

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
      - doc-to-md
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./tender-gpt.ru.crt:/etc/ssl/tender-gpt.ru.crt:ro
      - ./tender-gpt.ru.key:/etc/ssl/tender-gpt.ru.key:ro
      - ./ca.crt:/etc/ssl/ca.crt:ro

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    depends_on:
      - backend
      - etl-suppliers
      - etl-compare
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  db_data:
  doc_to_md_models:
  prometheus_data:
  grafana_data:
