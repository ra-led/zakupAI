name: Debug logs

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Check backend logs and test API
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/zakupai

            echo "=== CONTAINER STATUS ==="
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "=== BACKEND LOGS (last 80) ==="
            docker compose -f docker-compose.prod.yml logs --tail=80 backend 2>&1

            echo ""
            echo "=== NGINX LOGS (last 30) ==="
            docker compose -f docker-compose.prod.yml logs --tail=30 nginx 2>&1

            echo ""
            echo "=== TEST: curl backend health ==="
            docker compose -f docker-compose.prod.yml exec -T backend curl -s http://localhost:8000/health 2>&1 || echo "CURL FAILED"

            echo ""
            echo "=== TEST: curl backend /auth/register ==="
            docker compose -f docker-compose.prod.yml exec -T backend curl -s -X POST http://localhost:8000/auth/register \
              -H "Content-Type: application/json" \
              -d '{"email":"test-debug@example.com","password":"test123456"}' 2>&1 || echo "CURL FAILED"

            echo ""
            echo "=== TEST: curl via nginx /api/auth/register ==="
            docker compose -f docker-compose.prod.yml exec -T nginx curl -s -X POST http://backend:8000/auth/register \
              -H "Content-Type: application/json" \
              -d '{"email":"test-debug2@example.com","password":"test123456"}' 2>&1 || echo "CURL FAILED"

            echo ""
            echo "=== BACKEND ROUTES ==="
            docker compose -f docker-compose.prod.yml exec -T backend python -c "from app.main import app; print([r.path for r in app.routes])" 2>&1 || echo "ROUTES CHECK FAILED"
