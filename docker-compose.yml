services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zakupai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zakupai}
      POSTGRES_DB: ${POSTGRES_DB:-zakupai}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zakupai} -d ${POSTGRES_DB:-zakupai}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zakupai:zakupai@db:5432/zakupai}
      CORS_ORIGINS: ${CORS_ORIGINS}
      METRICS_SERVICE_NAME: backend
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
      PERPLEXITY_MIN_CONTACTS: ${PERPLEXITY_MIN_CONTACTS}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      PAGE_LOAD_TIMEOUT: ${PAGE_LOAD_TIMEOUT:-25}
      QUERY_DOCS_LIMIT: ${QUERY_DOCS_LIMIT:-3}
      ENABLE_EMBEDDED_QUEUE: ${ENABLE_EMBEDDED_QUEUE:-false}
    expose:
      - "8000"

  etl-suppliers-1:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zakupai:zakupai@db:5432/zakupai}
      METRICS_SERVICE_NAME: etl_suppliers_1
      METRICS_PORT: 9101
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
      PERPLEXITY_MIN_CONTACTS: ${PERPLEXITY_MIN_CONTACTS}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      PAGE_LOAD_TIMEOUT: ${PAGE_LOAD_TIMEOUT:-25}
      QUERY_DOCS_LIMIT: ${QUERY_DOCS_LIMIT:-3}
      ETL_POLL_INTERVAL: ${ETL_POLL_INTERVAL:-5}
      WORKER_TASK_TYPES: supplier_search,supplier_search_perplexity
    expose:
      - "8002"
      - "9101"

  etl-suppliers-2:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zakupai:zakupai@db:5432/zakupai}
      METRICS_SERVICE_NAME: etl_suppliers_2
      METRICS_PORT: 9102
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
      PERPLEXITY_MIN_CONTACTS: ${PERPLEXITY_MIN_CONTACTS}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      PAGE_LOAD_TIMEOUT: ${PAGE_LOAD_TIMEOUT:-25}
      QUERY_DOCS_LIMIT: ${QUERY_DOCS_LIMIT:-3}
      ETL_POLL_INTERVAL: ${ETL_POLL_INTERVAL:-5}
      WORKER_TASK_TYPES: supplier_search,supplier_search_perplexity
    expose:
      - "8002"
      - "9102"

  etl-suppliers-3:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zakupai:zakupai@db:5432/zakupai}
      METRICS_SERVICE_NAME: etl_suppliers_3
      METRICS_PORT: 9103
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      PERPLEXITY_MODEL: ${PERPLEXITY_MODEL}
      PERPLEXITY_MIN_CONTACTS: ${PERPLEXITY_MIN_CONTACTS}
      YANDEX_API_KEY: ${YANDEX_API_KEY}
      YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID}
      PAGE_LOAD_TIMEOUT: ${PAGE_LOAD_TIMEOUT:-25}
      QUERY_DOCS_LIMIT: ${QUERY_DOCS_LIMIT:-3}
      ETL_POLL_INTERVAL: ${ETL_POLL_INTERVAL:-5}
      WORKER_TASK_TYPES: supplier_search,supplier_search_perplexity
    expose:
      - "8002"
      - "9103"

  etl-compare-1:
    build:
      context: .
      dockerfile: etl/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://zakupai:zakupai@db:5432/zakupai}
      METRICS_SERVICE_NAME: etl_compare_1
      METRICS_PORT: 9104
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      OPENAI_MODEL: ${OPENAI_MODEL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL}
      ETL_POLL_INTERVAL: ${ETL_POLL_INTERVAL:-5}
      WORKER_TASK_TYPES: lot_comparison
    expose:
      - "8002"
      - "9104"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  doc-to-md:
    build:
      context: ./doc-to-md
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
    volumes:
      - doc_to_md_models:/models
    expose:
      - "8001"

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx.coolify
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - doc-to-md
    expose:
      - "80"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    depends_on:
      - backend
      - etl-suppliers-1
      - etl-suppliers-2
      - etl-suppliers-3
      - etl-compare-1
    expose:
      - "9090"
    command:
      - "--config.file=/etc/prometheus/main.yml"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.1.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    expose:
      - "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  db_data:
  doc_to_md_models:
  prometheus_data:
  grafana_data:
